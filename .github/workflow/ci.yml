name: CI – Hospital Spring Boot

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Checkout del código
      - name: Checkout repository
        uses: actions/checkout@v4

      # Config Java 17 (compatible con Spring Boot 3.2.x)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # Permisos de ejecución 
      - name: Grant execute permission to mvnw
        run: chmod +x ./mvnw

      # Compilacion
      - name: Compile
        run: ./mvnw compile --no-transfer-progress

      # Ex. tests de integración 
      - name: Run integration tests
        run: ./mvnw verify --no-transfer-progress

      # Publicar informe de resultados de tests
      - name: Publish test report
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: 'target/surefire-reports/*.xml'
        if: always()

      # Generar badge de cobertura 
      - name: Generate JaCoCo badge
        id: jacoco
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: target/site/jacoco/jacoco.csv
          badges-directory: .github/badges
          generate-coverage-badge: true

      # Informe
      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      # Reportes
      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

      # Commit del badge
      - name: Commit coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .github/badges/*.svg || true
          git diff --staged --quiet || git commit -m "chore: update JaCoCo coverage badge [skip ci]"
          git push
